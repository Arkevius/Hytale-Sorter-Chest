name: claude-review

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  claude-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          use_sticky_comment: true
          # Grant the tools Claude needs to read + review + post findings on the PR.
          # Without an explicit allowlist the action denies everything and Claude can't
          # do anything useful (confirmed: 13 permission denials, 0 comments).
          claude_args: --allowed-tools "Read,Grep,Glob,Bash(gh pr:*),Bash(gh api:*),mcp__github_inline_comment__create_inline_comment"
          prompt: |
            You are reviewing a pull request for the Sorting Chest Hytale mod. Read CLAUDE.md
            before anything else — it captures non-obvious Hytale API behaviors that affect
            correctness. The project is a server plugin in src/main/java/dev/sorter/sortingchest/
            (SortingChestPlugin.java, SortingChestBlock.java, SortingChestSystem.java) plus
            assets at src/main/resources/Server/.

            Review focus (in priority order):

            1. Correctness — does the change follow the Hytale API constraints in CLAUDE.md's
               "Non-obvious behaviors" section? Is ECS schema registration in setup() and
               runtime logic in start()? Are ECS events handled on the right bus? Is the
               chunk-store wrapping handled? Are state-variant block ids matched by prefix?
            2. Security — injection, path traversal, deserialization, anything that could be
               exploited by a player or a crafted asset pack.
            3. Correctness contradictions with documentation — does the change silently break
               claims in README.md or CLAUDE.md?
            4. Performance regressions on the 2-second sort tick (hot path for worlds with
               many chests).
            5. Code quality issues that matter — dead code, unused fields, leaky abstractions,
               unused imports. Skip style nits and formatting preferences.

            Post findings as inline PR review comments on the exact lines affected using your
            inline-comment tool. Do NOT invent Hytale APIs.

            End your review by posting ONE sticky comment (use_sticky_comment is on) that
            starts with exactly one of the following two lines, on its own line:

                SORTING-CHEST-VERDICT: APPROVE
                SORTING-CHEST-VERDICT: BLOCK — <one-sentence reason>

            APPROVE means no blocking issues. The PR author will still review before merge;
            your job is to catch what they would miss.

            BLOCK means there is at least one issue serious enough that merging would create
            a bug, security problem, or contradict documented behavior.

            Minor style nits, naming preferences, and subjective architecture opinions are
            never grounds to BLOCK. Be strict but fair.

      - name: Enforce verdict
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          PR_NUMBER="${{ github.event.pull_request.number }}"
          REPO="${{ github.repository }}"

          # Pull the most recent PR comment that carries our sentinel. Claude posts
          # a single sticky comment (use_sticky_comment: true), so we take the last
          # match across issue comments and review comments.
          VERDICT_LINE=$(
            {
              gh api "repos/${REPO}/issues/${PR_NUMBER}/comments" --paginate --jq '.[].body'
              gh api "repos/${REPO}/pulls/${PR_NUMBER}/reviews"   --paginate --jq '.[].body // empty'
            } | grep -E '^SORTING-CHEST-VERDICT:' | tail -1 || true
          )

          if [ -z "$VERDICT_LINE" ]; then
            echo "::error::No SORTING-CHEST-VERDICT line found in any PR comment — blocking PR."
            exit 1
          fi

          echo "Claude verdict: $VERDICT_LINE"
          case "$VERDICT_LINE" in
            "SORTING-CHEST-VERDICT: APPROVE"*)
              echo "::notice::Claude approved the PR for human review."
              exit 0
              ;;
            "SORTING-CHEST-VERDICT: BLOCK"*)
              echo "::error::Claude blocked this PR: ${VERDICT_LINE#SORTING-CHEST-VERDICT: }"
              exit 1
              ;;
            *)
              echo "::error::Unrecognized verdict line: $VERDICT_LINE"
              exit 1
              ;;
          esac
