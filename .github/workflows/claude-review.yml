name: claude-review

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  claude-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          use_sticky_comment: true
          prompt: |
            You are reviewing a pull request for the Sorting Chest Hytale mod. Read CLAUDE.md
            before anything else — it captures non-obvious Hytale API behaviors that affect
            correctness. The project is greenfield, single-file plugin at
            src/main/java/dev/sorter/sortingchest/SortingChestPlugin.java, plus an asset pack
            under src/main/resources/assets/UserData/mods/sorting_chest/.

            Review focus (in priority order):

            1. Correctness — does the change follow the Hytale API constraints in CLAUDE.md's
               "Non-obvious behaviors" section? Are ECS reads/writes dispatched via
               world.execute? Is chunk-store wrapping handled? Are state-variant block ids
               matched by prefix?
            2. Security — injection, path traversal, deserialization, anything that could be
               exploited by a player or a crafted asset pack.
            3. Correctness contradictions with documentation — does the change silently break
               claims in README.md or CLAUDE.md?
            4. Performance regressions on the 2-second sort tick (hot path for worlds with
               many chests).
            5. Code quality issues that matter — dead code, unused fields, leaky abstractions,
               unused imports. Skip style nits and formatting preferences.

            Use javap against ~/.gradle/caches/modules-2/files-2.1/com.hypixel.hytale to verify
            any Hytale API assumptions in the change. Do NOT invent APIs.

            Post findings as inline PR review comments on the exact lines affected.

            When your review is complete, write a single line to the file ./claude-verdict.txt
            in the repository workspace:

            - "APPROVE" — no blocking issues. The PR author still needs a human review before
              merge; your job is to catch what I would otherwise miss.
            - "BLOCK: <one-sentence reason>" — there is at least one issue serious enough that
              merging would create a bug, security problem, or contradict documented behavior.

            Minor style nits, naming preferences, and subjective architecture opinions are
            never grounds to BLOCK. Be strict but fair.

      - name: Enforce verdict
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -f claude-verdict.txt ]; then
            echo "::error::Claude did not write a verdict file — blocking PR."
            exit 1
          fi
          VERDICT=$(head -c 1024 claude-verdict.txt | tr -d '\r')
          echo "Claude verdict: $VERDICT"
          case "$VERDICT" in
            APPROVE*)
              echo "::notice::Claude approved the PR for human review."
              exit 0
              ;;
            BLOCK*)
              echo "::error::Claude blocked this PR: $VERDICT"
              exit 1
              ;;
            *)
              echo "::error::Unrecognized verdict from Claude: $VERDICT"
              exit 1
              ;;
          esac
